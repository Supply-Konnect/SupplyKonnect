version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: supplykonnect-postgres
    environment:
      POSTGRES_DB: supplykonnect
      POSTGRES_USER: supplykonnect
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - supplykonnect-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supplykonnect -d supplykonnect"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: supplykonnect-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - supplykonnect-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supplykonnect-backend
    environment:
      DATABASE_URL: postgres://supplykonnect:password@postgres:5432/supplykonnect
      REDIS_URL: redis://redis:6379
      HOST: 0.0.0.0
      PORT: 3001
      RUST_LOG: info
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - supplykonnect-network

volumes:
  postgres_data:
  redis_data:

networks:
  supplykonnect-network:
    driver: bridge
